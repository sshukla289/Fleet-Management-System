name: ${COMPOSE_PROJECT_NAME:-fleet_management_system_projects}

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fleet_db}
      MYSQL_USER: ${MYSQL_USER:-fleet_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fleet_app_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fleet_root_dev_password}
    command: ["mysqld", "--skip-name-resolve"]
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-fleet_root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      target: dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fleet_db}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-fleet_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fleet_app_dev_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-true}
      APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: ${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5173,http://127.0.0.1:5173}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
      APP_POD_EMAIL_FROM: ${APP_POD_EMAIL_FROM:-}
      APP_POD_EMAIL_ENABLED: ${APP_POD_EMAIL_ENABLED:-false}
      SERVER_PORT: 8080
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8081}:8080"
    volumes:
      - ./backend/src:/workspace/src:ro
      - backend_target:/workspace/target
      - backend_m2:/home/spring/.m2
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: ./client-frontend
      target: dev
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081/api}
      VITE_HTTP_BASE_URL: ${VITE_HTTP_BASE_URL:-http://localhost:8081}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./client-frontend/src:/workspace/src:ro
      - ./client-frontend/public:/workspace/public:ro
      - ./client-frontend/index.html:/workspace/index.html:ro
      - ./client-frontend/vite.config.ts:/workspace/vite.config.ts:ro
      - ./client-frontend/tsconfig.json:/workspace/tsconfig.json:ro
      - ./client-frontend/tsconfig.app.json:/workspace/tsconfig.app.json:ro
      - ./client-frontend/tsconfig.node.json:/workspace/tsconfig.node.json:ro
      - frontend_node_modules:/workspace/node_modules
      - frontend_npm_cache:/home/node/.npm
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  mysql_data_v2:
  backend_target:
  backend_m2:
  frontend_node_modules:
  frontend_npm_cache:
